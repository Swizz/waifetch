<main class="grid grid-cols-1 md:grid-cols-2 items-center">
	<div class="flex h-full bg-base-300/45 justify-center items-center">
		<img
			class="max-h-[500px] object-contain self-center"
			:src="(os || platform) && _platformImg(os, platform)"
			:alt="(os || platform) && `${platform} ${os}`"
		>
		</div>
		<div class="card border border-base-content/20 font-mono mx-10">
			<ul class="list p-0">
				<li class="list-row border-b border-base-content/20 rounded-none p-3">
					<label class="list-col-grow font-bold opacity-60">User:</label>
					<span>
						<span class="capitalize" :text="user">{ user }</span>@<span :text="hostname">{ hostname }</span>
					</span>
				</li>
				<li class="list-row border-b border-base-content/20 rounded-none p-3">
					<label class="list-col-grow font-bold opacity-60">OS:</label>
					<span>
						<span class="capitalize" :text="plateform">{ platform }</span>
						<span class="capitalize" :text="os">{ os }</span>
					</span>
				</li>
				<li class="list-row border-b border-base-content/20 rounded-none p-3">
					<label class="list-col-grow font-bold opacity-60">Kernel:</label>
					<span>
						<span :text="kernel">{ kernel }</span>
					</span>
				</li>
				<li class="list-row border-b border-base-content/20 rounded-none p-3">
					<label class="list-col-grow font-bold opacity-60">Uptime:</label>
					<span>
						<span :text="_fmtUptime(uptime)">{ uptime }</span>
					</span>
				</li>
				<li class="list-row border-b border-base-content/20 rounded-none p-3">
					<label class="list-col-grow font-bold opacity-60">CPU:</label>
					<span>
						<span :text="cpu">{ cpu }</span>
					</span>
				</li>
				<li class="list-row border-b border-base-content/20 rounded-none p-3">
					<label class="list-col-grow font-bold opacity-60">Disk:</label>
					<span>
						<span :text="_fmtBytes(disk.used)">{ disk.used }</span> /
						<span :text="_fmtBytes(disk.total)">{ disk.total }</span>
						(<span :text="_fmtPercent(disk.used / disk.total)">{ disk.used / disk.total }</span>)
					</span>
				</li>
				<li class="list-row rounded-none p-3">
					<label class="list-col-grow font-bold opacity-60">RAM:</label>
					<span>
					<span :text="_fmtBytes(mem.used)">{ mem.used }</span> /
					<span :text="_fmtBytes(mem.total)">{ mem.total }</span>
					(<span :text="_fmtPercent(mem.used / mem.total)">{ mem.used / mem.total }</span>)
					</span>
				</li>
			</ul>
		</div>
</main>
